# ============================================================================
# Fly.io config — Keycloak 26 (AI Agent OS realm)
#
# Required secrets (set with `flyctl secrets set -a <app> KEY=value`):
#   KEYCLOAK_ADMIN                   admin username
#   KEYCLOAK_ADMIN_PASSWORD          32+ byte random password
#   KC_DB_URL                        jdbc:postgresql://<fly-pg-host>:5432/keycloak
#   KC_DB_USERNAME
#   KC_DB_PASSWORD
#
# Volume: fly volumes create keycloak_data --size 5 --region iad
# Postgres: fly postgres create --name ai-agent-os-keycloak-db --region iad
# ============================================================================

app = "ai-agent-os-keycloak"
primary_region = "fra"
kill_signal = "SIGTERM"
kill_timeout = "30s"

[build]
  # dockerfile is passed via CLI: --dockerfile deploy/docker/Dockerfile.keycloak

[deploy]
  strategy = "immediate"

[env]
  KC_HTTP_ENABLED = "true"
  KC_HOSTNAME_STRICT = "false"
  KC_HOSTNAME = "ai-agent-os-keycloak.fly.dev"
  KC_PROXY_HEADERS = "xforwarded"
  KC_HEALTH_ENABLED = "true"
  KC_METRICS_ENABLED = "true"
  KC_LOG_LEVEL = "INFO"
  KC_CACHE = "local"

# The realm JSON and custom theme are baked into the image
# (see deploy/docker/Dockerfile.keycloak). The entrypoint runs
# `start --optimized --import-realm` automatically.

[[services]]
  protocol = "tcp"
  internal_port = 8080
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.concurrency]
    type = "requests"
    hard_limit = 400
    soft_limit = 300

  [[services.http_checks]]
    interval = "30s"
    timeout = "10s"
    grace_period = "180s"
    method = "get"
    path = "/realms/ai-agent-os/.well-known/openid-configuration"
    protocol = "http"
    tls_skip_verify = false

[[vm]]
  size = "shared-cpu-2x"
  memory = "4096mb"
