# ============================================================================
# Fly.io config — MongoDB 7 (internal storage for LibreChat)
# NOT publicly exposed; only reachable on Fly internal 6PN via `.flycast`.
# ============================================================================

app = "ai-agent-os-mongo"
primary_region = "fra"
kill_signal = "SIGTERM"
kill_timeout = "20s"

[build]
  image = "mongo:7.0"

[deploy]
  strategy = "immediate"

[env]
  MONGO_INITDB_ROOT_USERNAME = "librechat"
  # Override default entrypoint to bind on all interfaces (IPv4 + IPv6 for Fly 6PN).

[experimental]
  cmd = ["mongod", "--bind_ip", "0.0.0.0,::", "--ipv6", "--auth"]

[mounts]
  source = "mongo_data"
  destination = "/data/db"

[[services]]
  protocol = "tcp"
  internal_port = 27017
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  # NO public ports — only reachable via flycast from other Fly apps.

  [services.concurrency]
    type = "connections"
    hard_limit = 200
    soft_limit = 150

[[vm]]
  size = "shared-cpu-1x"
  memory = "1024mb"
