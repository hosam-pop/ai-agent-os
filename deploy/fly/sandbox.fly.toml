# Fly.io configuration for the ai-agent-os code-execution sandbox.
#
# Worker: shared-cpu-1x / 1 GB RAM. Browser automation (Playwright + chromium
# via the `browser_action` MCP tool) needs more headroom than the previous
# 256 MB; short Python/bash/node snippets called by the Manager Agent fit
# comfortably in the same VM. No volumes — every run uses an ephemeral /tmp
# directory inside the VM, including the browser session profile.

app = "ai-agent-os-sandbox"
primary_region = "fra"

[build]
  dockerfile = "../sandbox/Dockerfile"
  build-target = "base"

[env]
  PORT = "8080"
  # SANDBOX_TOKEN, GITHUB_PAT, GEMINI_API_KEY are set via `fly secrets set`.

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/healthz"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
